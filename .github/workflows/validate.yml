name: Validate

on:
  push:
  pull_request:

jobs:
  claude-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude runtime dependencies
        run: npm --prefix .claude ci

      - name: Check runtime files
        run: npm --prefix .claude run check:runtime

      - name: Run doctor in CI mode
        run: npm --prefix .claude run doctor -- --ci

      - name: Run smoke tests
        run: npm --prefix .claude run test:smoke
